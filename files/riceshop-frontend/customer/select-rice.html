<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Rice - Golden Grain Rice Shop</title>
    <!-- CSS imports -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>

    <!-- Header Navbar -->
    <header class="navbar">
        <a href="../index.html" class="logo-container" id="nav-logo-link">
            <img src="../assets/logo.png" alt="Golden Grain Logo" class="logo-img">
            <h1 class="logo-text">Golden<span>Grain</span></h1>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="select-rice.html">Our Rice</a></li>
                <li><a href="../owner/login.html">Owner Portal</a></li>
            </ul>
        </nav>
        <div class="nav-actions">
            <!-- Cart Icon Toggle Button -->
            <button class="btn-icon" id="cart-toggle-btn" title="View Cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="badge" id="cart-badge-count" style="display: none;">0</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">
        
        <!-- Progress Tracker -->
        <div class="progress-container">
            <div class="progress-line">
                <div class="progress-line-fill" style="width: 0%;"></div>
            </div>
            <div class="progress-step active">
                1
                <div class="progress-step-label">Select Rice</div>
            </div>
            <div class="progress-step">
                2
                <div class="progress-step-label">Customer Details</div>
            </div>
            <div class="progress-step">
                3
                <div class="progress-step-label">Order Summary</div>
            </div>
            <div class="progress-step">
                4
                <div class="progress-step-label">Success</div>
            </div>
        </div>

        <!-- Shop Layout -->
        <div class="shop-layout">
            <!-- Sidebar: Search and Category Filters -->
            <aside class="filter-sidebar">
                <div class="filter-section">
                    <h4>Search Rice</h4>
                    <div class="search-wrapper">
                        <!-- Search Icon -->
                        <svg class="search-icon-svg" viewBox="0 0 24 24">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        <input type="text" id="search-input" class="search-input" placeholder="Search premium rice...">
                    </div>
                </div>

                <div class="filter-section">
                    <h4>Categories</h4>
                    <div class="filter-options" id="category-filters-container">
                        <button class="filter-btn active" data-category="all">
                            <span>All Rice & Millets</span>
                            <span class="count-badge" id="count-all">0</span>
                        </button>
                        <button class="filter-btn" data-category="Traditional">
                            <span>Traditional Rice</span>
                            <span class="count-badge" id="count-traditional">0</span>
                        </button>
                        <button class="filter-btn" data-category="Aromatic">
                            <span>Aromatic Rice</span>
                            <span class="count-badge" id="count-aromatic">0</span>
                        </button>
                        <button class="filter-btn" data-category="Daily Use">
                            <span>Daily Use Rice</span>
                            <span class="count-badge" id="count-daily">0</span>
                        </button>
                        <button class="filter-btn" data-category="Millets">
                            <span>Healthy Millets</span>
                            <span class="count-badge" id="count-millets">0</span>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Catalog Grid -->
            <section>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 id="catalog-title">Our Premium Rice Catalog</h2>
                    <span id="results-count" style="color: var(--text-muted); font-size: 14px; font-weight: 500;">Showing 5 items</span>
                </div>
                <div class="products-grid" id="products-grid-container">
                    <!-- Product Cards will be rendered dynamically by JavaScript -->
                </div>
            </section>
        </div>

    </main>

    <!-- Cart Sidebar Drawer -->
    <div class="cart-backdrop" id="cart-backdrop"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Shopping Cart (<span id="cart-total-count">0</span>)</h3>
            <button class="cart-close" id="cart-close-btn">&times;</button>
        </div>
        
        <!-- Cart Items List -->
        <div class="cart-items-container" id="cart-items-container">
            <!-- Dynamically populated -->
        </div>

        <!-- Cart Footer / Totals -->
        <div class="cart-footer">
            <div class="cart-summary-line">
                <span>Subtotal</span>
                <span id="cart-subtotal">₹0</span>
            </div>
            <div class="cart-summary-line">
                <span>Estimated Shipping</span>
                <span id="cart-shipping" style="color: var(--primary);">FREE</span>
            </div>
            <div class="cart-summary-line total">
                <span>Total Amount</span>
                <span id="cart-grandtotal">₹0</span>
            </div>
            <button class="btn btn-primary" id="checkout-btn" style="width: 100%; margin-top: 16px; padding: 14px;">Proceed to Delivery Details</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/common.js"></script>
    <script src="../js/select-rice.js"></script>
</body>
</html>
